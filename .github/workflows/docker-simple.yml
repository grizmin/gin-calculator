name: Build and Deploy Docker Image

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:
    inputs:
      deploy_to_dockerhub:
        description: 'Deploy to Docker Hub?'
        type: boolean
        default: true # if it makes it to the main branch, we want to deploy it by default

env:
  IMAGE_NAME: gin-calculator

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=raw,value=latest,enable={{is_default_branch}}
          type=raw,value={{date 'YYYYMMDD-HHmmss'}}

    - name: Build Docker image
      id: build
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile
        push: false
        load: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Test Docker image
      run: |
        IMAGE_TAG=$(echo "${{ steps.meta.outputs.tags }}" | head -n1)
        docker run -d --name test-gin-calc -p 8080:8000 $IMAGE_TAG
        sleep 15
        curl -f http://localhost:8080/ || (docker logs test-gin-calc && exit 1)
        docker stop test-gin-calc && docker rm test-gin-calc
        echo "Tests passed!"

    - name: Save image
      run: |
        TAGS=$(echo "${{ steps.meta.outputs.tags }}" | tr '\n' ' ')
        docker save ${TAGS} | gzip > /tmp/image.tar.gz

    - name: Upload image artifact
      uses: actions/upload-artifact@v4
      with:
        name: docker-image
        path: /tmp/image.tar.gz

  deploy:
    name: Deploy to Docker Hub
    needs: build
    runs-on: ubuntu-latest
    if: github.event.inputs.deploy_to_dockerhub == 'true' || github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download image artifact
      uses: actions/download-artifact@v4
      with:
        name: docker-image

    - name: Load image
      run: |
        gunzip -c /tmp/image.tar.gz | docker load

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}
        tags: |
          type=raw,value=latest
          type=raw,value={{date 'YYYYMMDD-HHmmss'}}

    - name: Push to Docker Hub
      run: |
        for tag in ${{ steps.meta.outputs.tags }}; do
          docker tag ${{ env.IMAGE_NAME }}:latest "$tag"
          docker push "$tag"
        done

    - name: Deployment info
      run: |
        echo "Deployed to Docker Hub:"
        echo "${{ steps.meta.outputs.tags }}" | sed 's/^/  - /'
        echo "Pull: docker pull ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest"
